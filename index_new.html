      left: 0;
      right: 0;

      z-index: 100;
      padding: 0 24px;
    }

      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 64px;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--accent-green);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo svg {
      width: 28px;
      height: 28px;
    }

    .nav-links {
      display: flex;
      gap: 24px;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent-green);
    }

      text-align: center;
      background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.85rem;
      color: var(--accent-green);
      margin-bottom: 24px;
    }

    .hero h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, #9ca3af 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto 32px;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--accent-green);
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .category-section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .category-icon {
      font-size: 1.5rem;
    }

    .category-title {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .category-count {
      background: var(--bg-card);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* Project Grid */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
    }

    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s;
    }

      border-color: var(--accent-green);
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0, 255, 136, 0.08);

    .card-header {

      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .project-info {
      display: flex;
      align-items: center;
      gap: 12px;

      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      background: var(--bg-secondary);

      padding: 4px;

    .icon-ai { background: linear-gradient(135deg, #1a1a2e, #16213e); }
    .icon-node { background: linear-gradient(135deg, #1a1a2e, #16213e); }

      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;

      color: var(--accent-green);

      color: var(--text-secondary);
      margin-bottom: 12px;
      line-height: 1.5;

      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .instructions-header {

      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.2s;

    .instructions-header:hover {

    .instructions-title {

      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--accent-green);
    }

    .instructions-toggle {
      color: var(--text-secondary);
      transition: transform 0.3s;
    }

    .instructions-toggle.open {
      transform: rotate(180deg);
    }

    .instructions-content {

      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .instructions-content.open {
      max-height: 500px;

    .instructions-list {

      color: var(--text-secondary);
      padding: 6px 0;
      padding-left: 20px;
      position: relative;

    .instructions-list li::before {

      left: 6px;
      color: var(--accent-green);

    .empty-state {

      padding: 60px 24px;
      color: var(--text-secondary);

            <div class="instructions-content">
              <ul class="instructions-list">
                ${instructionsList}
              </ul>
            </div>
          </div>
          
          <div class="card-footer">
            <a href="${project.link}" target="_blank" class="action-btn">注册参与 →</a>
          </div>
        </div>
      `;
    }

    function toggleInstructions(header) {
      const content = header.nextElementSibling;
      const toggle = header.querySelector('.instructions-toggle');
      content.classList.toggle('open');
      toggle.classList.toggle('open');
    }

    function renderAll() {
      // Filter by category
      const networkProjects = projects.filter(p => p.category === 'network');
      const aiProjects = projects.filter(p => p.category === 'ai');
      const nodeProjects = projects.filter(p => p.category === 'node');

      // Render grids
      document.getElementById('networkGrid').innerHTML = networkProjects.map(renderProjectCard).join('');
      document.getElementById('aiGrid').innerHTML = aiProjects.map(renderProjectCard).join('');
      document.getElementById('nodeGrid').innerHTML = nodeProjects.map(renderProjectCard).join('');

      // Update stats
      document.getElementById('totalCount').textContent = projects.length;
      document.getElementById('activeCount').textContent = projects.filter(p => p.status === 'active').length;
    }

    // Initialize
    renderAll();
  </script>
</body>
</html>
